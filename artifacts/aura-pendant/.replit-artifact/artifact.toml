kind = "mobile"
previewPath = "/"
title = "Aura Pendant Pro"
version = "1.0.0"
id = "artifacts/aura-pendant"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21533

[services.development]
run = "pnpm --filter @workspace/aura-pendant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aura-pendant", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/aura-pendant", "run", "serve" ]

[services.env]
PORT = "21533"
BASE_PATH = "/"
